spring:
  datasource:
    url: jdbc:h2:mem:label4002_e2e;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
  flyway:
    enabled: false

app:
  cors:
    allowed-origins: http://127.0.0.1:4173,http://localhost:4173
  jwt:
    secret: e2e-secret-e2e-secret-e2e-secret-e2e-secret
    access-minutes: 30
    refresh-days: 7
  testing:
    enabled: true
