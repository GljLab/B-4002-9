server:
  port: ${PORT:8081}
  servlet:
    session:
      cookie:
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:false}
        same-site: lax

spring:
  application:
    name: label-4002-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/blog_mvp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USER:root}
    password: ${DB_PASS:}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    target: ${FLYWAY_TARGET:10}
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  jwt:
    secret: ${APP_JWT_SECRET:label-4002-default-dev-secret-label-4002-default-dev-secret}
    access-minutes: ${APP_JWT_ACCESS_MINUTES:30}
    refresh-days: ${APP_JWT_REFRESH_DAYS:7}
  testing:
    enabled: ${APP_TESTING_ENABLED:false}
  upload:
    path: ${APP_UPLOAD_PATH:./uploads}
  base-url: ${APP_BASE_URL:http://localhost:8080}

logging:
  pattern:
    console: '{"time":"%d{yyyy-MM-dd''T''HH:mm:ss.SSSXXX}","level":"%5p","traceId":"%X{traceId:-}","thread":"%t","logger":"%c{1}","message":"%m"}%n'
