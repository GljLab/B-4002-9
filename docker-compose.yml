services:
  gateway:
    image: nginx:1.27
    container_name: label4002_gateway
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - '8080:80'
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: label4002_frontend
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: label4002_backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 8080
      DB_URL: jdbc:mysql://db:3306/blog_mvp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
      DB_USER: blog_user
      DB_PASS: 200569
      FLYWAY_TARGET: 13
      SESSION_COOKIE_SECURE: 'false'
      CORS_ALLOWED_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      APP_JWT_SECRET: label-4002-prod-secret-label-4002-prod-secret
      APP_UPLOAD_PATH: /app/uploads
      APP_BASE_URL: http://localhost:8080
    volumes:
      - label4002_uploads:/app/uploads
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: label4002_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: blog_mvp
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: 200569
    ports:
      - '3307:3306'
    volumes:
      - label4002_mysql_data:/var/lib/mysql
      - ./infra/db/init/01-schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./infra/db/init/02-seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot_password']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped

volumes:
  label4002_mysql_data:
  label4002_uploads:
